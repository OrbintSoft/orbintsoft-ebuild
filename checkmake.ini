# checkmake configuration for the orbintsoft overlay.
# Upstream: https://github.com/checkmake/checkmake
#
# Deviations from checkmake's built-in defaults, with rationale:

[minphony]
# This overlay has no build step: the default goal is `help` and there is
# deliberately no `all` target. Require only the phony targets that exist here.
required = clean,test

[maxbodylength]
# `lint-sh` is a single if/else shell statement that reads clearly at 6 lines.
maxBodyLength = 10
