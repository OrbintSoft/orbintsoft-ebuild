# Dependabot — owns the GitHub Actions pins (PLAN.md 3.2).
#
# Scope split with Renovate (PLAN.md 3.3): Dependabot maintains the action pins in
# .github/workflows/ (actions/checkout, actions/setup-go), which are pinned to a
# full commit SHA carrying a `# vX.Y.Z` version comment — Dependabot keeps both the
# SHA and the comment current, for reproducible, tamper-evident builds. Everything
# Dependabot can't reach is Renovate's: the Go lint tools (`go install …@vX.Y.Z`)
# and the gentoo/stage3 container digest (see renovate.json5). Renovate's
# github-actions manager is disabled so the two bots never open competing PRs.
# Ebuild dependencies are out of scope entirely (the bump bot's job, 3.5).
#
# Runs weekly; an on-demand run is available from the repo's Insights ->
# Dependency graph -> Dependabot tab. All action bumps are grouped into one PR.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
