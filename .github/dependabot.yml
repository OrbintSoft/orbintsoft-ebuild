# Dependabot — maintains the GitHub Actions pins.
#
# Dependabot bumps the action pins in .github/workflows/ (actions/checkout,
# actions/setup-go, actions/setup-node), which are pinned to a full commit SHA
# carrying a `# vX.Y.Z` version comment — it keeps both the SHA and the comment
# current, for reproducible, tamper-evident builds. Renovate also maintains these
# pins (see renovate.json5), on a different day — the two overlap on actions.
# Everything else is Renovate's alone: the Go lint tools (`go install …@vX.Y.Z`)
# and the gentoo/stage3 container digest. Ebuild dependencies are out of scope
# entirely (the bump bot's job).
#
# Runs weekly; an on-demand run is available from the repo's Insights ->
# Dependency graph -> Dependabot tab. All action bumps are grouped into one PR.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:00"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
