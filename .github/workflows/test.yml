#
# Test CI: build+install overlay packages from source, each in its own throwaway
# gentoo/stage3 container (PLAN.md Phase 2D/2E). On pull_request the discover job
# computes a DYNAMIC matrix of just the packages the diff affects (2.9); on
# workflow_dispatch it fans out the full suite (2.8). One package per parallel
# job so each gets its own time budget. The builds are heavy (GHC, Rust, GTK from
# source), so this runs on pull_request and manual dispatch, not on every push.

name: test

on:
  pull_request:
  workflow_dispatch:

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Decide which packages the test job fans out over. On a PR that's the dynamic
  # set computed from the diff (scripts/changed-packages.sh); otherwise the full
  # overlay (scripts/list-packages.sh). Both keep the package logic in shared,
  # shellcheck-linted scripts rather than hardcoded here. An empty result ("[]",
  # e.g. a docs-only PR) makes the test matrix expand to zero jobs.
  discover:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - name: Check out the overlay
        uses: actions/checkout@v4
        with:
          # Full history so a pull_request can be diffed against its merge-base.
          fetch-depth: 0

      - name: Select packages to test
        id: list
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${EVENT_NAME}" = pull_request ]; then
            # Dynamic matrix (2.9): only the packages the diff affects.
            packages="$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}" \
              | scripts/changed-packages.sh --json)"
          else
            # workflow_dispatch (no diff to compute against): full suite.
            packages="$(scripts/list-packages.sh --json)"
          fi
          echo "Selected packages: ${packages}"
          echo "packages=${packages}" >> "${GITHUB_OUTPUT}"

  # One fresh container per package, full source. fail-fast: false so every
  # package is exercised even when one fails (we want the whole picture). docker
  # is preinstalled on ubuntu-latest; TREE_MODE=webrsync fetches the gentoo tree
  # inside the container since the runner has no host /var/db/repos/gentoo.
  test:
    needs: discover
    runs-on: ubuntu-latest
    name: ${{ matrix.package }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    steps:
      - name: Check out the overlay
        uses: actions/checkout@v4

      - name: Build + install ${{ matrix.package }} from source
        env:
          TREE_MODE: webrsync
        run: make test PKG='${{ matrix.package }}'
