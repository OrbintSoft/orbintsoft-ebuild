# Ebuild bump bot (PLAN.md Phase 3.5). Weekly, livecheck (Tatsh/livecheck) checks
# the overlay's packages for new upstream releases and, when it finds one, rewrites
# the ebuild + regenerates the Manifest; the changes are opened as a pull request.
# livecheck needs a Gentoo environment, so the work runs in a throwaway gentoo/stage3
# container (scripts/livecheck-ci.sh + scripts/livecheck-container.sh) with the
# overlay mounted read-write; the PR is opened from the runner with the built-in
# GITHUB_TOKEN. Today only media-fonts/nerd-fonts is versioned (everything else is a
# live -9999 ebuild livecheck skips), so most weeks this is a no-op (no diff -> no PR).

name: livecheck

on:
  schedule:
    # Weekly, Monday 05:00 UTC — roughly aligned with the other weekly bots
    # (Dependabot/Renovate "before 6am on monday").
    - cron: '0 5 * * 1'
  workflow_dispatch:

# Don't cancel an in-flight bump (it may be fetching distfiles for the Manifest).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    # Widened past the top-level read-only default (CLAUDE.md Rule 14) only here:
    # create-pull-request pushes a branch (contents) and opens the PR (pull-requests).
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out the overlay
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run livecheck in a stage3 container
        env:
          # Forwarded into the container so livecheck authenticates its GitHub API
          # calls (read-only public data) and avoids the unauthenticated rate limit.
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/livecheck-ci.sh

      - name: Normalize ownership of container-written files
        # The container runs as root, so any bumped files come back root-owned;
        # hand them back to the runner user before create-pull-request commits.
        run: sudo chown -R "$(id -u):$(id -g)" .

      - name: Open or update the bump pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: livecheck/bump
          delete-branch: true
          commit-message: "chore(bump): ebuild version bumps via livecheck"
          title: "chore(bump): ebuild version bumps (livecheck)"
          labels: |
            automated
            bump
          body: |
            Automated upstream version bumps detected by
            [livecheck](https://github.com/Tatsh/livecheck) (PLAN.md Phase 3.5).

            livecheck rewrote the affected ebuild(s) and `pkgdev manifest` regenerated
            the Manifest in a throwaway gentoo/stage3 container. Review the diff and the
            CI before merging.

            > Note: this PR is opened by `GITHUB_TOKEN`, so the `test` workflow does not
            > run on it automatically — trigger it manually if a build check is wanted.
