# Weekly ebuild bump bot: livecheck (Tatsh/livecheck) checks the overlay for new
# upstream releases and, when it finds one, opens a PR with the bumped ebuild +
# regenerated Manifest. The work runs in a throwaway gentoo/stage3 container
# (scripts/livecheck-ci.sh), since livecheck needs a Gentoo environment; the PR is
# opened from the runner with the built-in GITHUB_TOKEN. Most weeks it is a no-op
# (only versioned ebuilds are bumpable; the live -9999 ones are skipped).

name: livecheck

on:
  schedule:
    # Weekly, Thursday 20:00 UTC.
    - cron: '0 20 * * 4'
  workflow_dispatch:

# Don't cancel an in-flight bump (it may be fetching distfiles for the Manifest).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    # create-pull-request pushes a branch (contents) and opens the PR
    # (pull-requests); the top-level default is read-only.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out the overlay
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run livecheck in a stage3 container
        env:
          # Authenticates livecheck's GitHub API calls (avoids the unauthenticated
          # rate limit, which is shared per-IP on Actions runners).
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/livecheck-ci.sh

      - name: Normalize ownership of container-written files
        # Container runs as root → bumped files come back root-owned; hand them
        # back to the runner user before create-pull-request commits.
        run: sudo chown -R "$(id -u):$(id -g)" .

      - name: Open or update the bump pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: livecheck/bump
          delete-branch: true
          # Commit through the GitHub API so it is GPG-signed by GitHub (shows as
          # Verified, attributed to github-actions[bot]); a plain GITHUB_TOKEN push
          # produces an unsigned commit.
          sign-commits: true
          commit-message: "chore(bump): ebuild version bumps via livecheck"
          title: "chore(bump): ebuild version bumps (livecheck)"
          labels: |
            automated
            bump
          body: |
            Automated upstream version bumps detected by
            [livecheck](https://github.com/Tatsh/livecheck) (PLAN.md Phase 3.5).

            livecheck rewrote the affected ebuild(s) and `pkgdev manifest` regenerated
            the Manifest in a throwaway gentoo/stage3 container. Review the diff and the
            CI before merging.

            > Note: this PR is opened by `GITHUB_TOKEN`, so the `test` workflow does not
            > run on it automatically — trigger it manually if a build check is wanted.
