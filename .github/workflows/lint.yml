#
# Quality CI: the container-free linters (shellcheck + checkmake + xmllint +
# yamllint + actionlint), i.e. `make lint-ci`. pkgcheck needs the gentoo ebuild
# tree and is wired in later together with the containerized test infrastructure
# (PLAN.md Phase 2B/2D).

name: lint

on:
  # push only on master (post-merge); feature branches are linted through their
  # PR — pull_request re-fires on every push to an open PR. This avoids the
  # duplicate run that push:'**' + pull_request produced on every PR branch.
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the overlay
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go (for checkmake)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # renovate: datasource=golang-version depName=go
          go-version: '1.26.4'

      - name: Set up Node (for renovate-config-validator)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # renovate: datasource=node-version depName=node
          node-version: '22.23.0'

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            shellcheck libxml2-utils yamllint
          # Versions pinned + kept current by Renovate (see renovate.json5; the
          # `# renovate:` lines are its custom-manager annotations, not active shell).
          # renovate: datasource=github-tags depName=checkmake/checkmake
          go install github.com/checkmake/checkmake/cmd/checkmake@v0.3.2
          # renovate: datasource=github-tags depName=rhysd/actionlint
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Run linters (no gentoo tree needed)
        run: make lint-ci
